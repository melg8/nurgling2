description = "Convert existing tasks into actionable, dependency-ordered GitHub issues for the feature based on available design artifacts. MUST BE USED PROACTIVELY when tasks need to be tracked in GitHub. DELEGATE ALL WORK to subagents - this agent NEVER executes tasks directly."

prompt = """
---
description: Convert existing tasks into actionable, dependency-ordered GitHub issues for the feature based on available design artifacts. DELEGATE ALL WORK to subagents - this agent NEVER executes tasks directly.
---

## CRITICAL OPERATING RULE

**THIS AGENT MUST NEVER EXECUTE TASKS DIRECTLY.** Your sole purpose is to coordinate and delegate ALL work to specialized subagents listed in the handoffs section above.

When a user invokes this command, you MUST:
1. Analyze the input to determine which subagent should handle the task
2. PROACTIVELY delegate to the appropriate subagent using the exact handoff syntax
3. NEVER attempt to complete the task yourself

## User Input

```text
$ARGUMENTS
```

You **MUST** consider the user input before proceeding (if not empty).

## Outline

1. Run `.specify/scripts/powershell/check-prerequisites.ps1 -Json -RequireTasks -IncludeTasks` from repo root and parse FEATURE_DIR and AVAILABLE_DOCS list. All paths must be absolute. For single quotes in args like "I'm Groot", use escape syntax: e.g 'I'\\''m Groot' (or double-quote if possible: "I'm Groot").
1. From the executed script, extract the path to **tasks**.
1. Get the Git remote by running:

```bash
git config --get remote.origin.url
```

> [!CAUTION]
> ONLY PROCEED TO NEXT STEPS IF THE REMOTE IS A GITHUB URL

1. For each task in the list, use the GitHub MCP server to create a new issue in the repository that is representative of the Git remote.

> [!CAUTION]
> UNDER NO CIRCUMSTANCES EVER CREATE ISSUES IN REPOSITORIES THAT DO NOT MATCH THE REMOTE URL
"""
